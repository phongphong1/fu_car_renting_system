version: '3.8'

services:
  # --------------------------------------------------------
  # 1. PostgreSQL
  # --------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: fucar_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - fucar_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - fucar_network

  # --------------------------------------------------------
  # 2. pgAdmin
  # --------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: fucar_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - fucar_network

  # --------------------------------------------------------
  # 3. Zookeeper
  # --------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fucar_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fucar_network

  # --------------------------------------------------------
  # 4. Kafka
  # --------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fucar_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fucar_network

  # --------------------------------------------------------
  # 5. Eureka Server
  # --------------------------------------------------------
  eureka-server:
    build:
      context: .
      dockerfile: infrastructure/eureka-server/Dockerfile
      args:
        SERVICE_PATH: infrastructure/eureka-server
    container_name: fucar_eureka
    ports:
      - "8761:8761"
    networks:
      - fucar_network

    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8761/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------
  # 6. API Gateway
  # --------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: infrastructure/api-gateway/Dockerfile
      args:
        SERVICE_PATH: infrastructure/api-gateway
    container_name: fucar_gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - fucar_network

  # --------------------------------------------------------
  # 7. Customer Service
  # --------------------------------------------------------
  customer-service:
    build:
      context: .
      dockerfile: service/customer-service/Dockerfile
      args:
        SERVICE_PATH: service/customer-service
    container_name: fucar_customer
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/customer_db
      - DB_USER=root
      - DB_PASSWORD=root
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      eureka-server:
        condition: service_healthy
    restart: on-failure
    networks:
      - fucar_network

  # --------------------------------------------------------
  # 8. Car Service
  # --------------------------------------------------------
  car-service:
    build:
      context: .
      dockerfile: service/car-service/Dockerfile
      args:
        SERVICE_PATH: service/car-service
    container_name: fucar_car
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/car_db
      - DB_USER=root
      - DB_PASSWORD=root
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      eureka-server:
        condition: service_healthy
    restart: on-failure
    networks:
      - fucar_network

  # --------------------------------------------------------
  # 9. Renting Service (Nhạc trưởng Saga)
  # --------------------------------------------------------
  renting-service:
    build:
      context: .
      dockerfile: service/renting-service/Dockerfile
      args:
        SERVICE_PATH: service/renting-service
    container_name: fucar_renting
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/rental_db
      - DB_USER=root
      - DB_PASSWORD=root
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      eureka-server:
        condition: service_healthy
    restart: on-failure
    networks:
      - fucar_network

volumes:
  fucar_data:

networks:
  fucar_network:
    driver: bridge