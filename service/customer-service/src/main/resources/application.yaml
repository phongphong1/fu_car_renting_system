server:
  port: 8082

app:
  admin:
    email: admin@gmail.com
    password: admin
  jwt:
    secret: mot-chuoi-bi-mat-cuc-ky-dai-va-kho-doan-abc-xyz

    expirationMs: 86400000

spring:
  application:
    name: customer-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: public

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/