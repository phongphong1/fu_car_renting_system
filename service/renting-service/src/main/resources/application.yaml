server:
  port: 8083

spring:
  application:
    name: renting-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    table: flyway_schema_history

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/